spring.application.name=UserMicroService
server.port=8083

spring.config.import=configserver:http://localhost:8888

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/MY2TEK_user_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8100/realms/MY2TEK-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8100/realms/MY2TEK-realm/protocol/openid-connect/certs