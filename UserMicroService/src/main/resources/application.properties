spring.application.name=UserMicroService
server.port=8089

# Disable Config Server (no config server running)
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
spring.config.import=optional:configserver:

# Eureka - register but don't fail if server is down
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
# Don't block startup if Eureka is unavailable
eureka.client.should-enforce-registration-at-init=false

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/MY2TEK_user_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

