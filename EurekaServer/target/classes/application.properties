spring.application.name=EurekaServer
server.port=8761

# Don't register itself as a client
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Reduce startup delay
eureka.server.wait-time-in-ms-when-sync-empty=0

# Lower renewal threshold for small clusters (3-4 services)
# This removes the EMERGENCY warning when few services are registered
eureka.server.renewal-percent-threshold=0.49
eureka.server.enable-self-preservation=false
