spring.application.name=apigetway
server.port=8085

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# ── Keycloak JWT Validation ───────────────────────────────────────────────────
# Comment these out if Keycloak is not running — gateway will still work
# Uncomment when Keycloak is set up and running on port 8180
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/my2tek
#spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/my2tek/protocol/openid-connect/certs

# ── CORS ─────────────────────────────────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# Actuator
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
