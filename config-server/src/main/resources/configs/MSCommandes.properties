# ============================================================
# Configuration centralisée pour MS-Commandes
# Servie par Config Server (http://localhost:8888/MSCommandes/default)
# ============================================================

server.port=8090

# MySQL
spring.datasource.url=jdbc:mysql://mysqldb:3306/MY2TEK_commandes_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8100/realms/MY2TEK-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8100/realms/MY2TEK-realm/protocol/openid-connect/certs
