<div class="auth-full-page">
  <div class="auth-split-wrapper">
    <div class="auth-form-side">
      <div class="auth-card">
        <div class="auth-header">
          <h1 class="logo">MY2<span>TEK</span></h1>
          <p>Nouveau mot de passe</p>
          <p style="font-size: 0.85rem; color: #4f637d;">Réinitialisation pour : <strong>{{ email }}</strong></p>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger fade-in">{{ errorMessage }}</div>
        <div *ngIf="successMessage" class="alert alert-success fade-in">{{ successMessage }}</div>

        <form class="auth-form" (ngSubmit)="onReset()">
          <div class="input-group">
            <label>Nouveau mot de passe</label>
            <input type="password" name="newPassword" [(ngModel)]="newPassword" placeholder="••••••••" required>
          </div>

          <div class="input-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-primary" [disabled]="isLoading || !email">
            <span *ngIf="!isLoading">Mettre à jour</span>
            <span *ngIf="isLoading" class="loader"></span>
          </button>
        </form>
      </div>
    </div>

    <div class="auth-image-side login-bg">
      <div class="image-overlay-text">
        <h2>Sécurité renforcée.</h2>
        <p>Votre nouveau mot de passe doit être fort et unique.</p>
      </div>
    </div>
  </div>
</div>
