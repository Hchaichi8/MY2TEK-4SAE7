spring.application.name=config-server
server.port=8888

# Source des configurations : dossier local dans ce projet
spring.cloud.config.server.native.search-locations=classpath:/configs

# Activer le profil natif (fichiers locaux, pas Git)
spring.profiles.active=native

# Eureka s'enregistrer dans le service discovery
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
