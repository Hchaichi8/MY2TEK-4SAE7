
# Ce fichier est servi par le Config Server sur http://localhost:8888

server.port=8086

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/MY2TEK_commandes_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RabbitMQ
rabbitmq.enabled=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

commandes.rabbitmq.queue=commandes.queue
commandes.rabbitmq.exchange=commandes.exchange
commandes.rabbitmq.routingkey=commandes.routingkey

# Feign
spring.cloud.openfeign.circuitbreaker.enabled=false

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
