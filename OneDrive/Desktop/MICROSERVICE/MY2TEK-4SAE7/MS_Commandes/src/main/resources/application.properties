spring.application.name=MSCommandes
server.port=8086

spring.config.import=optional:configserver:http://localhost:8888

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/MY2TEK_commandes_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Désactiver RabbitMQ
rabbitmq.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Queue names (gardés pour référence future)
commandes.rabbitmq.queue=commandes.queue
commandes.rabbitmq.exchange=commandes.exchange
commandes.rabbitmq.routingkey=commandes.routingkey

# Désactiver circuit breaker Feign (MSSTOCK absent)
spring.cloud.openfeign.circuitbreaker.enabled=false
