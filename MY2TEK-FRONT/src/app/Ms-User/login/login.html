<div class="auth-full-page">
  <div class="auth-split-wrapper">
    <div class="auth-form-side">
      <div class="auth-card">
        <div class="auth-header">
          <h1 class="logo">MY2<span>TEK</span></h1>
          <p>Bon retour parmi nous !</p>
        </div>

        <div class="tab-group">
          <button class="tab-btn active" >Connexion</button>
          <button class="tab-btn" >Inscription</button>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger fade-in">
          <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
        </div>
        
        <div *ngIf="successMessage" class="alert alert-success fade-in">
          <i class="fas fa-check-circle"></i> {{ successMessage }}
        </div>

        <form class="auth-form" (ngSubmit)="onLogin()">
          <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" [(ngModel)]="loginData.email" required placeholder="votre@email.com">
          </div>
          
          <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" name="password" [(ngModel)]="loginData.password" required placeholder="••••••••">
          </div>

          <div class="form-extras">
            <label class="remember-me">
              <input type="checkbox"> Se souvenir
            </label>
            <a routerLink="/forgot-password" class="forgot-link">Mot de passe oublié ?</a>
          </div>

          <button type="submit" class="btn-primary" [disabled]="isLoading">
            <span *ngIf="!isLoading">Se Connecter</span>
            <span *ngIf="isLoading" class="loader"></span>
          </button>
        </form>

        <div class="divider">
          <span>OU</span>
        </div>

       <div class="google-btn-container">
  <asl-google-signin-button 
    type="standard" 
    size="large" 
    [width]="350">
  </asl-google-signin-button>
</div>
        
        <div class="auth-footer">
          <p>Nouveau chez MY2TEK ? <span routerLink="/Register" class="link">Créer un compte</span></p>
        </div>
      </div>
    </div>

    <div class="auth-image-side login-bg">
      <div class="image-overlay-text">
        <h2>Boostez votre setup.</h2>
        <p>Les meilleures offres High-Tech sont ici.</p>
      </div>
    </div>
  </div>
</div>
