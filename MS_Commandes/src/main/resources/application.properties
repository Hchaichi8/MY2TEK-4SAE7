spring.application.name=MSCommandes
server.port=8090

# Config Server
# En local : localhost | En Docker : variable SPRING_CONFIG_IMPORT écrase cette valeur
spring.config.import=optional:configserver:http://config-server:8888
spring.cloud.config.enabled=true
spring.cloud.config.fail-fast=false

# MySQL
# En local : localhost | En Docker : SPRING_DATASOURCE_URL écrase
spring.datasource.url=jdbc:mysql://mysqldb:3306/MY2TEK_commandes_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
# En local : localhost | En Docker : EUREKA_CLIENT_SERVICEURL_DEFAULTZONE écrase
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true

# RabbitMQ
# En local : localhost | En Docker : SPRING_RABBITMQ_HOST écrase
rabbitmq.enabled=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Noms des queues RabbitMQ
commandes.rabbitmq.queue=commandes.queue
commandes.rabbitmq.exchange=commandes.exchange
commandes.rabbitmq.routingkey=commandes.routingkey
commandes.rabbitmq.queue.cancelled=commandes.cancelled.queue
commandes.rabbitmq.routingkey.cancelled=commandes.cancelled.routingkey

# Feign
spring.cloud.openfeign.circuitbreaker.enabled=true

# Keycloak / JWT
# En local : localhost:8100 | En Docker : SPRING_SECURITY_OAUTH2_... écrase
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8100/realms/MY2TEK-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8100/realms/MY2TEK-realm/protocol/openid-connect/certs

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true